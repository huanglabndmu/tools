<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huang Lab Tools - Super Universal Calculator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-color: #fcfcfd;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(255, 204, 213, 0.6) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(255, 243, 204, 0.7) 0%, transparent 35%),
                radial-gradient(circle at 80% 80%, rgba(204, 235, 255, 0.6) 0%, transparent 45%),
                radial-gradient(circle at 20% 90%, rgba(224, 240, 255, 0.5) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
        }

        .lab-title {
            color: #0b5394;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1rem;
            margin-bottom: 5px;
            text-align: center;
        }
        
        h1 { 
            color: #1a202c; 
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .mode-switch {
            display: flex;
            background: rgba(226, 232, 240, 0.6);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 18px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-weight: 600;
            color: #718096;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            user-select: none;
        }

        .mode-btn.active {
            background: white;
            color: #2b6cb0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .solve-hint {
            text-align: center;
            font-size: 0.9rem;
            color: #4a5568;
            background: rgba(56, 178, 172, 0.08);
            border: 1px dashed rgba(56, 178, 172, 0.5);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 22px;
            line-height: 1.4;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .badge {
            display: none;
            font-size: 0.72rem;
            font-weight: 700;
            color: #319795;
            background: rgba(56, 178, 172, 0.14);
            padding: 2px 9px;
            border-radius: 20px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .badge.show { display: inline-block; }

        .input-row { display: flex; gap: 10px; }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #cbd5e0;
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            transition: all 0.2s;
            min-width: 0;
        }

        input:focus { border-color: #38b2ac; }

        input.solving {
            border-color: #38b2ac;
            border-style: dashed;
            background: rgba(56, 178, 172, 0.07);
        }

        .mw-hint {
            font-size: 0.8rem;
            color: #718096;
            margin-top: 4px;
        }

        select {
            padding: 12px 15px;
            border: 1px solid #cbd5e0;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            outline: none;
            width: 105px;
        }

        #calcBtn { 
            width: 100%;
            padding: 15px; 
            font-size: 1.3rem; 
            font-weight: bold;
            cursor: pointer; 
            background-color: #38b2ac; 
            color: white; 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 6px 12px rgba(56, 178, 172, 0.25);
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        
        #calcBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px rgba(56, 178, 172, 0.35);
            background-color: #319795;
        }

        #calcBtn:active { transform: translateY(1px); }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(247, 250, 252, 0.8);
            border-left: 5px solid #38b2ac;
            display: none; 
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .headline {
            font-size: 1.2rem;
            color: #2b6cb0;
            font-weight: 700;
            margin: 2px 0 14px 0;
            line-height: 1.5;
        }

        .recipe-item {
            font-size: 1.05rem;
            color: #4a5568;
            margin: 8px 0;
            line-height: 1.5;
        }

        .highlight { color: #2b6cb0; font-weight: 700; }
        
        .error-message {
            color: #e53e3e;
            font-weight: 600;
            background: #fff5f5;
            border-left: 5px solid #e53e3e;
            line-height: 1.5;
        }

        .warning-box {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #fffaf0;
            border-left: 5px solid #ed8936;
            color: #9c4221;
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="lab-title">Huang Lab Tools</div>
        <h1>Super Universal Calculator</h1>

        <div class="mode-switch">
            <div class="mode-btn active" id="modeDilution">💧 Dilution</div>
            <div class="mode-btn" id="modeSolid">⚖️ Solid Powder</div>
        </div>

        <div class="solve-hint" id="solveHint">
            Fill in any <strong>three</strong> — leave one blank and it's solved automatically.
        </div>

        <div class="input-group" id="groupMW">
            <label for="mw">Molecular Weight (MW) <span style="font-weight:400; color:#a0aec0;">[Optional]</span></label>
            <div class="input-row">
                <input type="number" id="mw" placeholder="e.g., 58.44" step="any" min="0">
                <select disabled style="background:#edf2f7; color:#a0aec0; border-color:#edf2f7;"><option>g/mol</option></select>
            </div>
            <div class="mw-hint">* Only needed when converting <strong>between</strong> molar units (M/mM/µM/nM) and mass units (w/v %, mg/mL, µg/mL).</div>
        </div>

        <div class="input-group" id="groupC1">
            <label for="c1">Stock Concentration (C₁) <span class="badge" id="badge_c1">will solve</span></label>
            <div class="input-row">
                <input type="number" id="c1" placeholder="e.g., 10" step="any" min="0">
                <select id="c1_unit">
                    <option value="w/v %">w/v %</option>
                    <option value="v/v %">v/v %</option>
                    <option value="M">M</option>
                    <option value="mM" selected>mM</option>
                    <option value="uM">µM</option>
                    <option value="nM">nM</option>
                    <option value="mg/mL">mg/mL</option>
                    <option value="ug/mL">µg/mL</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="groupV1">
            <label for="v1">Stock Volume (V₁) <span class="badge" id="badge_v1">will solve</span></label>
            <div class="input-row">
                <input type="number" id="v1" placeholder="e.g., 20" step="any" min="0">
                <select id="v1_unit">
                    <option value="L">L</option>
                    <option value="mL">mL</option>
                    <option value="uL" selected>µL</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="groupMass" style="display:none;">
            <label for="mass">Powder Mass (m) <span class="badge" id="badge_mass">will solve</span></label>
            <div class="input-row">
                <input type="number" id="mass" placeholder="e.g., 5" step="any" min="0">
                <select id="mass_unit">
                    <option value="g">g</option>
                    <option value="mg" selected>mg</option>
                    <option value="ug">µg</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="groupC2">
            <label for="c2">Final Concentration (C₂) <span class="badge" id="badge_c2">will solve</span></label>
            <div class="input-row">
                <input type="number" id="c2" placeholder="e.g., 50" step="any" min="0">
                <select id="c2_unit">
                    <option value="w/v %">w/v %</option>
                    <option value="v/v %" id="c2opt_vv">v/v %</option>
                    <option value="M">M</option>
                    <option value="mM">mM</option>
                    <option value="uM" selected>µM</option>
                    <option value="nM">nM</option>
                    <option value="mg/mL">mg/mL</option>
                    <option value="ug/mL">µg/mL</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="groupV2">
            <label for="v2">Final Volume (V₂) <span class="badge" id="badge_v2">will solve</span></label>
            <div class="input-row">
                <input type="number" id="v2" placeholder="e.g., 2" step="any" min="0">
                <select id="v2_unit">
                    <option value="L">L</option>
                    <option value="mL" selected>mL</option>
                    <option value="uL">µL</option>
                </select>
            </div>
        </div>

        <button id="calcBtn">Calculate</button>
        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        let currentMode = 'dilution';   // 'dilution' | 'solid'

        const resultBox = document.getElementById('resultBox');
        const solveHint = document.getElementById('solveHint');
        const CONC_FIELDS = ['c1', 'v1', 'c2', 'v2'];
        const SOLID_FIELDS = ['mass', 'c2', 'v2'];
        const ALL_TARGET_FIELDS = ['c1', 'v1', 'c2', 'v2', 'mass'];
        function activeFields() { return currentMode === 'dilution' ? CONC_FIELDS : SOLID_FIELDS; }

        /* ===== 單位家族 ===== */
        function unitCategory(unit) {
            if (['M', 'mM', 'uM', 'nM'].includes(unit)) return 'molar';
            if (unit === 'v/v %') return 'vv';
            return 'mass';
        }
        function toMolar(val, unit) {
            return { M: val, mM: val / 1e3, uM: val / 1e6, nM: val / 1e9 }[unit];
        }
        function fromMolar(M, unit) {
            return { M: M, mM: M * 1e3, uM: M * 1e6, nM: M * 1e9 }[unit];
        }
        // 顯示用：把內部單位碼統一成帶 µ 的漂亮寫法（內部運算仍用 ASCII 碼）
        function displayUnit(u) {
            return { 'uM': 'µM', 'ug/mL': 'µg/mL' }[u] || u;
        }
        function toMgPerMl(val, unit, mw) {
            const cat = unitCategory(unit);
            if (cat === 'mass') {
                if (unit === 'w/v %') return val * 10;   // 1% w/v = 10 mg/mL
                if (unit === 'mg/mL') return val;
                if (unit === 'ug/mL') return val / 1000;
            }
            if (cat === 'molar') {
                if (isNaN(mw) || mw <= 0) return null;
                return toMolar(val, unit) * mw;          // g/L = mg/mL
            }
            return null;
        }

        /* 決定兩個濃度單位的共同基準：'vv' | 'molar' | 'mass' | 'vv_cross' */
        function basisType(u1, u2) {
            const a = unitCategory(u1), b = unitCategory(u2);
            if (a === 'vv' || b === 'vv') return (a === b) ? 'vv' : 'vv_cross';
            if (a === 'molar' && b === 'molar') return 'molar';
            return 'mass';
        }
        // 濃度值 → 基準值（mass 基準為 mg/mL，molar 基準為 M，vv 基準為 % 本身）
        function toBasis(val, unit, type, mw) {
            if (type === 'vv') return val;
            if (type === 'molar') return toMolar(val, unit);
            return toMgPerMl(val, unit, mw); // null 代表缺 MW
        }
        // 基準值 → 指定單位
        function fromBasis(val, unit, type, mw) {
            if (type === 'vv') return val;
            if (type === 'molar') return fromMolar(val, unit);
            // mass 基準 (mg/mL)
            const cat = unitCategory(unit);
            if (cat === 'mass') {
                if (unit === 'w/v %') return val / 10;
                if (unit === 'mg/mL') return val;
                if (unit === 'ug/mL') return val * 1000;
            }
            if (cat === 'molar') {
                if (isNaN(mw) || mw <= 0) return null;
                return fromMolar(val / mw, unit);        // mg/mL ÷ (g/mol) = M
            }
            return null;
        }

        /* ===== 小工具 ===== */
        function toMl(v, unit) {
            if (unit === 'L')  return v * 1000;
            if (unit === 'uL') return v / 1000;
            return v;
        }
        function toMg(v, unit) {
            if (unit === 'g')  return v * 1000;
            if (unit === 'ug') return v / 1000;
            return v;
        }
        function num(n, d) { return Number(n.toFixed(d)).toString(); }
        function formatMass(mg) {
            if (mg >= 1000) return `${num(mg / 1000, 4)} g`;
            if (mg >= 1)    return `${num(mg, 3)} mg`;
            return `${num(mg * 1000, 2)} µg`;
        }
        function formatVolume(mL) {
            if (mL >= 1000) return `${num(mL / 1000, 3)} L`;
            if (mL >= 1)    return `${num(mL, 3)} mL`;
            return `${num(mL * 1000, 2)} µL`;
        }
        function formatConc(val) {
            if (val >= 1) return num(val, 3);
            return Number(val.toPrecision(3)).toString();
        }
        function pctError(val, unit) {
            if ((unit === 'v/v %' || unit === 'w/v %') && val > 100) {
                return `<strong>Scientific Error:</strong> A ${unit} concentration cannot exceed 100%.`;
            }
            return null;
        }
        function val(id) {
            const s = document.getElementById(id).value.trim();
            if (s === '') return NaN;
            return parseFloat(s);
        }

        /* ===== 欄位顯示 & 即時標記待解欄位 ===== */
        function show(id, on) { document.getElementById(id).style.display = on ? 'block' : 'none'; }

        function refreshTarget() {
            ALL_TARGET_FIELDS.forEach(id => {
                document.getElementById(id).classList.remove('solving');
                document.getElementById('badge_' + id).classList.remove('show');
            });
            const fields = activeFields();
            const empties = fields.filter(id => document.getElementById(id).value.trim() === '');
            if (empties.length === 1) {
                const id = empties[0];
                document.getElementById(id).classList.add('solving');
                document.getElementById('badge_' + id).classList.add('show');
            }
        }

        function updateFields() {
            const vvOpt = document.getElementById('c2opt_vv');
            const c2sel = document.getElementById('c2_unit');
            if (currentMode === 'dilution') {
                solveHint.innerHTML = "Fill in any <strong>three</strong> — leave one blank and it's solved automatically.";
                show('groupC1', true); show('groupV1', true); show('groupMass', false); show('groupC2', true); show('groupV2', true);
                document.querySelector('#groupC2 label').firstChild.textContent = 'Final Concentration (C₂) ';
                document.querySelector('#groupV2 label').firstChild.textContent = 'Final Volume (V₂) ';
                vvOpt.hidden = false; vvOpt.disabled = false;   // 稀釋模式保留 v/v %
            } else { // solid
                solveHint.innerHTML = "Fill in any <strong>two</strong> — leave one blank and it's solved automatically.";
                show('groupC1', false); show('groupV1', false); show('groupMass', true); show('groupC2', true); show('groupV2', true);
                document.querySelector('#groupC2 label').firstChild.textContent = 'Concentration (C₂) ';
                document.querySelector('#groupV2 label').firstChild.textContent = 'Solution Volume (V₂) ';
                // 固體無法配 v/v % → 從單位選單移除；若目前正選著它，切回 mg/mL
                if (c2sel.value === 'v/v %') c2sel.value = 'mg/mL';
                vvOpt.hidden = true; vvOpt.disabled = true;
            }
            solveHint.style.display = 'block';
            resultBox.style.display = 'none';
            refreshTarget();
        }

        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateFields();
        }
        document.getElementById('modeDilution').addEventListener('click', e => setMode('dilution', e.currentTarget));
        document.getElementById('modeSolid').addEventListener('click', e => setMode('solid', e.currentTarget));

        ALL_TARGET_FIELDS.forEach(id => document.getElementById(id).addEventListener('input', refreshTarget));

        const calcBtn = document.getElementById('calcBtn');
        calcBtn.addEventListener('click', runCalc);
        ['mw', 'c1', 'v1', 'c2', 'v2', 'mass'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') runCalc(); });
        });

        /* ============================================================
           主計算
           ============================================================ */
        function runCalc() {
            const mw = parseFloat(document.getElementById('mw').value);
            if (currentMode === 'solid') { runSolid(mw); return; }

            const c1 = val('c1'), u1 = document.getElementById('c1_unit').value;
            const v1 = val('v1'), vu1 = document.getElementById('v1_unit').value;
            const c2 = val('c2'), u2 = document.getElementById('c2_unit').value;
            const v2 = val('v2'), vu2 = document.getElementById('v2_unit').value;

            const provided = { c1: !isNaN(c1), v1: !isNaN(v1), c2: !isNaN(c2), v2: !isNaN(v2) };
            const missing = CONC_FIELDS.filter(id => !provided[id]);

            if (missing.length === 0) {
                showError("You've filled in all four fields. Clear the <strong>one</strong> value you want me to solve for.");
                return;
            }
            if (missing.length > 1) {
                showError("Please fill in <strong>three</strong> fields and leave exactly one blank.");
                return;
            }

            // 已填數值需為正
            for (const id of CONC_FIELDS) {
                if (provided[id] && !(val(id) > 0)) {
                    showError("All entered values must be positive numbers.");
                    return;
                }
            }
            let e = null;
            if (provided.c1) { e = pctError(c1, u1); if (e) { showError(e); return; } }
            if (provided.c2) { e = pctError(c2, u2); if (e) { showError(e); return; } }

            const target = missing[0];
            let R = { c1, u1, v1, vu1, c2, u2, v2, vu2 }; // 解出後填回

            // ---- 解「體積」：兩個濃度都已知，用共同基準求比值 ----
            if (target === 'v1' || target === 'v2') {
                const type = basisType(u1, u2);
                if (type === 'vv_cross') { showError(vvCrossMsg()); return; }
                const cb1 = toBasis(c1, u1, type, mw);
                const cb2 = toBasis(c2, u2, type, mw);
                if (cb1 === null || cb2 === null) { showError(needMwMsg()); return; }

                if (target === 'v1') {
                    R.v1 = (cb2 / cb1) * toMl(v2, vu2);   // mL
                    R.vu1 = 'mL_raw';
                } else {
                    R.v2 = (cb1 / cb2) * toMl(v1, vu1);   // mL
                    R.vu2 = 'mL_raw';
                }
            }
            // ---- 解「濃度」：一個濃度 + 兩個體積 ----
            else {
                const v1_mL = toMl(v1, vu1), v2_mL = toMl(v2, vu2);
                if (target === 'c2') {
                    const type = basisType(u1, u2);
                    if (type === 'vv_cross') { showError(vvCrossMsg()); return; }
                    const cb1 = toBasis(c1, u1, type, mw);
                    if (cb1 === null) { showError(needMwMsg()); return; }
                    const cb2 = cb1 * (v1_mL / v2_mL);
                    const out = fromBasis(cb2, u2, type, mw);
                    if (out === null) { showError(needMwMsg()); return; }
                    R.c2 = out;
                } else { // c1
                    const type = basisType(u1, u2);
                    if (type === 'vv_cross') { showError(vvCrossMsg()); return; }
                    const cb2 = toBasis(c2, u2, type, mw);
                    if (cb2 === null) { showError(needMwMsg()); return; }
                    const cb1 = cb2 * (v2_mL / v1_mL);
                    const out = fromBasis(cb1, u1, type, mw);
                    if (out === null) { showError(needMwMsg()); return; }
                    R.c1 = out;
                }
            }

            // ---- 此時四個值都齊了，統一驗證與呈現 ----
            const v1_mL = (R.vu1 === 'mL_raw') ? R.v1 : toMl(R.v1, R.vu1);
            const v2_mL = (R.vu2 === 'mL_raw') ? R.v2 : toMl(R.v2, R.vu2);

            // 濃度大小檢查（不能濃縮）
            const type = basisType(R.u1, R.u2);
            const cbA = toBasis(R.c1, R.u1, type, mw);
            const cbB = toBasis(R.c2, R.u2, type, mw);
            if (cbA !== null && cbB !== null && cbB > cbA * 1.0000001) {
                showError("These numbers would require <strong>concentrating</strong> the solution (C₂ > C₁, or V₂ < V₁). Simple dilution can only make things less concentrated.");
                return;
            }
            if (v2_mL < v1_mL) {
                showError("Final Volume (V₂) can't be smaller than Stock Volume (V₁).");
                return;
            }

            const solvent_mL = v2_mL - v1_mL;
            const v1_uL = v1_mL * 1000;

            // 顯示字串
            const c1Str = `${formatConc(R.c1)} ${displayUnit(R.u1)}`;
            const c2Str = `${formatConc(R.c2)} ${displayUnit(R.u2)}`;
            const v1Str = formatVolume(v1_mL);
            const v2Str = formatVolume(v2_mL);
            const solventStr = formatVolume(solvent_mL);

            const solvedLabel = { c1: `C₁ = ${c1Str}`, v1: `V₁ = ${v1Str}`, c2: `C₂ = ${c2Str}`, v2: `V₂ = ${v2Str}` }[target];

            // 取用體積過小警告
            let warningHtml = "";
            if (v1_uL < 1.0) {
                warningHtml = `
                    <div class="warning-box">
                        <strong>⚠️ Pipetting Alert:</strong> The stock volume to pipette is under 1 µL (<span class="highlight">${num(v1_uL, 4)} µL</span>).<br><br>
                        💡 <strong>Suggestion:</strong> Do a <strong>serial dilution</strong> (dilute the stock 10× or 100× first, then take a pipettable volume).
                    </div>`;
            }

            // 定容提示：v/v% 混合，或 stock 佔最終體積比例夠大時，體積不完全可加 → 建議定容。
            // 高倍稀釋（stock 佔比很小）時影響可忽略，不顯示以保持乾淨。
            let precisionNote = "";
            const stockFraction = v1_mL / v2_mL;
            if (unitCategory(R.u1) === 'vv' || stockFraction >= 0.1) {
                precisionNote = `<div class="mw-hint" style="margin-top:8px;">*Liquid volumes aren't perfectly additive — mixing can cause slight contraction, and a concentrated stock carries its own volume. For accuracy, place the stock in a volumetric flask and add solvent <strong>up to ${v2Str}</strong>, rather than adding exactly ${solventStr}.</div>`;
            }

            showResult(`
                ${warningHtml}
                <div class="result-title">💧 Dilution Recipe</div>
                <div class="headline">Solved: ${solvedLabel}</div>
                <div class="recipe-item">1. Take <span class="highlight">${v1Str}</span> of Stock (${c1Str}).</div>
                <div class="recipe-item">2. Add <span class="highlight">${solventStr}</span> of Solvent.</div>
                <div class="recipe-item">3. Final: <span class="highlight">${v2Str}</span> at <span class="highlight">${c2Str}</span>.</div>
                ${precisionNote}
            `);
        }

        /* ============ 固體配藥：質量 = 濃度 × 體積，填二空一 ============ */
        function runSolid(mw) {
            const m  = val('mass'), mu = document.getElementById('mass_unit').value;
            const c2 = val('c2'),  c2u = document.getElementById('c2_unit').value;
            const v2 = val('v2'),  v2u = document.getElementById('v2_unit').value;

            const provided = { mass: !isNaN(m), c2: !isNaN(c2), v2: !isNaN(v2) };
            const missing = SOLID_FIELDS.filter(id => !provided[id]);

            if (missing.length === 0) {
                showError("You've filled in all three fields. Clear the <strong>one</strong> value you want me to solve for.");
                return;
            }
            if (missing.length > 1) {
                showError("Please fill in <strong>two</strong> fields and leave exactly one blank.");
                return;
            }
            for (const id of SOLID_FIELDS) {
                if (provided[id] && !(val(id) > 0)) {
                    showError("All entered values must be positive numbers.");
                    return;
                }
            }

            // 固體無法配製 v/v %
            if (c2u === 'v/v %') {
                showError("<strong>Scientific Error:</strong> Solid powder cannot make a v/v % (volume/volume) solution. Use w/v %, a molar unit, or mg/mL.");
                return;
            }
            if (provided.c2) { const pe = pctError(c2, c2u); if (pe) { showError(pe); return; } }

            const target = missing[0];
            let R = { m, mu, c2, c2u, v2, v2u };
            let computedMass = false;

            if (target === 'mass') {
                const cmg = toMgPerMl(c2, c2u, mw);          // mg/mL
                if (cmg === null) { showError(needMwMsg()); return; }
                R.m = cmg * toMl(v2, v2u); R.mu = 'mg_raw'; computedMass = true;
            } else if (target === 'v2') {
                const cmg = toMgPerMl(c2, c2u, mw);
                if (cmg === null) { showError(needMwMsg()); return; }
                R.v2 = toMg(m, mu) / cmg; R.v2u = 'mL_raw';  // mL
            } else { // 解 c2
                const cmg = toMg(m, mu) / toMl(v2, v2u);     // mg/mL
                const out = fromBasis(cmg, c2u, 'mass', mw);
                if (out === null) { showError(needMwMsg()); return; }
                R.c2 = out;
            }

            const mass_mg = (R.mu === 'mg_raw') ? R.m : toMg(R.m, R.mu);
            const v2_mL   = (R.v2u === 'mL_raw') ? R.v2 : toMl(R.v2, R.v2u);
            const massStr = formatMass(mass_mg);
            const v2Str   = formatVolume(v2_mL);
            const c2Str   = `${formatConc(R.c2)} ${displayUnit(R.c2u)}`;
            const solvedLabel = { mass: `m = ${massStr}`, c2: `C₂ = ${c2Str}`, v2: `V₂ = ${v2Str}` }[target];

            let weighWarning = "";
            if (computedMass && mass_mg < 1) {
                weighWarning = `
                    <div class="warning-box">
                        <strong>⚠️ Weighing Alert:</strong> Required mass is below 1 mg (<span class="highlight">${massStr}</span>), hard to weigh accurately on a standard balance (±0.1 mg).<br><br>
                        💡 <strong>Suggestion:</strong> Weigh a larger amount to make a concentrated stock, then use <strong>Dilution</strong> mode.
                    </div>`;
            }

            showResult(`
                ${weighWarning}
                <div class="result-title">⚖️ Solid Powder Recipe</div>
                <div class="headline">Solved: ${solvedLabel}</div>
                <div class="recipe-item">1. Weigh <span class="highlight">${massStr}</span> of solid powder.</div>
                <div class="recipe-item">2. Add solvent up to <span class="highlight">${v2Str}</span>.</div>
                <div class="recipe-item">3. Final concentration: <span class="highlight">${c2Str}</span>.</div>
            `);
        }

        function vvCrossMsg() {
            return "<strong>Scientific Error:</strong> You can't cross-convert v/v % with molar, w/v %, or mass units (the liquid's density is unknown). Keep both concentrations in v/v %.";
        }
        function needMwMsg() {
            return "You're converting between molar and mass units. You MUST provide the Molecular Weight (MW).";
        }

        function showResult(html) {
            resultBox.style.display = 'block';
            resultBox.className = 'result-box';
            resultBox.innerHTML = html;
        }
        function showError(msg) {
            resultBox.style.display = 'block';
            resultBox.className = 'result-box error-message';
            resultBox.innerHTML = `⚠️ ${msg}`;
        }

        updateFields();
    </script>
</body>
</html>
